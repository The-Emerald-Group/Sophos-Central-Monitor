<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sophos Central Alerts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --crit:#ff3b30;--high:#ff9500;--med:#ffcc00;--low:#4cd964;
    --sophos:#00b0f0;--bg:#080a0e;--surface:#0f1318;--border:#1c2028;--text:#e2e8f0;--muted:#4a5568;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;padding:28px 32px;}

  header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:14px;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--sophos);box-shadow:0 0 12px var(--sophos);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
  h1{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:600;letter-spacing:4px;color:#fff;text-transform:uppercase;}
  .sub{font-size:.7rem;color:var(--muted);letter-spacing:2px;margin-top:3px;}
  .htime{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;color:var(--sophos);text-align:right;}
  .hlbl{font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;text-align:right;}

  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:28px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;border-top:3px solid var(--muted);}
  .stat.total{border-top-color:var(--sophos);}.stat.crit{border-top-color:var(--crit);}
  .stat.high{border-top-color:var(--high);}.stat.med{border-top-color:var(--med);}.stat.low{border-top-color:var(--low);}
  .sn{font-family:'IBM Plex Mono',monospace;font-size:2rem;font-weight:600;line-height:1;}
  .sn.total{color:var(--sophos);}.sn.crit{color:var(--crit);}.sn.high{color:var(--high);}
  .sn.med{color:var(--med);}.sn.low{color:var(--low);}
  .sl{font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:6px;}

  .toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
  .search{flex:1;min-width:220px;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 14px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;}
  .search:focus{border-color:var(--sophos);}.search::placeholder{color:var(--muted);}
  .fb{padding:9px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.75rem;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
  .fb:hover{border-color:var(--sophos);color:var(--text);}
  .fb.a-all{border-color:var(--sophos);color:var(--sophos);background:rgba(0,176,240,.08);}
  .fb.a-crit{border-color:var(--crit);color:var(--crit);background:rgba(255,59,48,.08);}
  .fb.a-high{border-color:var(--high);color:var(--high);background:rgba(255,149,0,.08);}
  .fb.a-med{border-color:var(--med);color:var(--med);background:rgba(255,204,0,.08);}
  .fb.a-low{border-color:var(--low);color:var(--low);background:rgba(76,217,100,.08);}

  .tw{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead tr{background:var(--surface);}
  th{padding:11px 16px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border);}
  td{padding:12px 16px;font-size:.83rem;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(255,255,255,.025);}

  .badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:.65rem;font-family:'IBM Plex Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
  .badge.critical{background:rgba(255,59,48,.15);color:var(--crit);border:1px solid rgba(255,59,48,.3);}
  .badge.high{background:rgba(255,149,0,.15);color:var(--high);border:1px solid rgba(255,149,0,.3);}
  .badge.medium{background:rgba(255,204,0,.12);color:var(--med);border:1px solid rgba(255,204,0,.3);}
  .badge.low{background:rgba(76,217,100,.1);color:var(--low);border:1px solid rgba(76,217,100,.25);}
  .chip{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.65rem;background:rgba(255,255,255,.05);color:#888;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;}
  .tchip{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.7rem;background:rgba(0,176,240,.08);color:var(--sophos);border:1px solid rgba(0,176,240,.2);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
  .dc{max-width:300px;}.dm{color:var(--text);line-height:1.4;}
  .dd{font-size:.75rem;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
  .tc{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);white-space:nowrap;}
  .empty{text-align:center;padding:80px 20px;background:var(--surface);}
  .ei{font-size:2.5rem;margin-bottom:16px;}.et{font-size:1rem;color:#fff;margin-bottom:8px;}
  .es{font-size:.8rem;color:var(--muted);}.ee{color:var(--crit);font-family:'IBM Plex Mono',monospace;font-size:.8rem;margin-top:12px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div><h1>Sophos Central</h1><div class="sub">Active Alert Monitor — Partner View</div></div>
  </div>
  <div>
    <div id="hclock" class="htime">--:--:--</div>
    <div class="hlbl">Last Harvest</div>
  </div>
</header>

<div class="stats">
  <div class="stat total"><div class="sn total" id="s-total">—</div><div class="sl">Total Alerts</div></div>
  <div class="stat crit"> <div class="sn crit"  id="s-crit">—</div><div class="sl">Critical</div></div>
  <div class="stat high"> <div class="sn high"  id="s-high">—</div><div class="sl">High</div></div>
  <div class="stat med">  <div class="sn med"   id="s-med">—</div><div class="sl">Medium</div></div>
  <div class="stat low">  <div class="sn low"   id="s-low">—</div><div class="sl">Low</div></div>
  <div class="stat total"><div class="sn total" id="s-ten">—</div><div class="sl">Tenants Polled</div></div>
</div>

<div class="toolbar">
  <input class="search" id="search" placeholder="Search alerts, devices, tenants, categories..." oninput="render()">
  <button class="fb a-all" id="f-all"  onclick="sf('all')">All</button>
  <button class="fb"       id="f-crit" onclick="sf('critical')">Critical</button>
  <button class="fb"       id="f-high" onclick="sf('high')">High</button>
  <button class="fb"       id="f-med"  onclick="sf('medium')">Medium</button>
  <button class="fb"       id="f-low"  onclick="sf('low')">Low</button>
</div>

<div class="tw" id="tw">
  <div class="empty"><div class="ei">⏳</div><div class="et">Awaiting first harvest...</div><div class="es">Refreshes every 30 seconds</div></div>
</div>

<script>
  let data=[], filt='all';
  const fmap={all:'f-all',critical:'f-crit',high:'f-high',medium:'f-med',low:'f-low'};
  const fcls={all:'a-all',critical:'a-crit',high:'a-high',medium:'a-med',low:'a-low'};

  function sf(f){
    filt=f;
    document.querySelectorAll('.fb').forEach(b=>b.className='fb');
    const b=document.getElementById(fmap[f]);
    if(b) b.className='fb '+fcls[f];
    render();
  }

  function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  async function load(){
    try{
      const r=await fetch('data.json?v='+Date.now());
      const d=await r.json();
      document.getElementById('hclock').textContent  = d.timestamp||'--:--:--';
      document.getElementById('s-total').textContent = d.total??'—';
      document.getElementById('s-crit').textContent  = d.counts?.critical??'—';
      document.getElementById('s-high').textContent  = d.counts?.high??'—';
      document.getElementById('s-med').textContent   = d.counts?.medium??'—';
      document.getElementById('s-low').textContent   = d.counts?.low??'—';
      document.getElementById('s-ten').textContent   = d.tenants_polled??'—';
      if(d.error){
        document.getElementById('tw').innerHTML=`<div class="empty"><div class="ei">⚠️</div><div class="et">Could not retrieve alerts</div><div class="ee">${e(d.error)}</div></div>`;
        return;
      }
      data=d.alerts||[];
      render();
    }catch(err){console.error(err);}
  }

  function render(){
    const q=document.getElementById('search').value.toLowerCase();
    const rows=data.filter(a=>{
      const sok=filt==='all'||a.severity===filt;
      const qok=!q||[a.description,a.device,a.category,a.product,a.type,a.tenant].join(' ').toLowerCase().includes(q);
      return sok&&qok;
    });
    if(!rows.length){
      document.getElementById('tw').innerHTML=`<div class="empty"><div class="ei">✅</div><div class="et">${data.length===0?'No active alerts':'No alerts match your filter'}</div><div class="es">${data.length===0?'Your Sophos estate is clean.':'Try adjusting the filter or search.'}</div></div>`;
      return;
    }
    document.getElementById('tw').innerHTML=`
      <table>
        <thead><tr><th>Severity</th><th>Description</th><th>Tenant</th><th>Category</th><th>Product</th><th>Raised</th></tr></thead>
        <tbody>${rows.map(a=>`
          <tr>
            <td><span class="badge ${e(a.severity)}">${e(a.severity)}</span></td>
            <td class="dc"><div class="dm">${e(a.description)}</div>${a.device?`<div class="dd">📍 ${e(a.device)}</div>`:''}</td>
            <td>${a.tenant?`<span class="tchip">${e(a.tenant)}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
            <td><span class="chip">${e(a.category)}</span></td>
            <td class="tc" style="color:#555">${e(a.product)}</td>
            <td class="tc">${e(a.raised)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  setInterval(load,30000);
  load();
</script>
</body>
</html>
