<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sophos Central — Alerts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --crit:    #ff3b30;
    --high:    #ff9500;
    --med:     #ffcc00;
    --low:     #4cd964;
    --blue:    #0a84ff;
    --sophos:  #00b0f0;
    --bg:      #080a0e;
    --surface: #0f1318;
    --border:  #1c2028;
    --text:    #e2e8f0;
    --muted:   #4a5568;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 28px 32px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--sophos);
    box-shadow: 0 0 12px var(--sophos);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.8); }
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 4px;
    color: #fff;
    text-transform: uppercase;
  }
  .subtitle { font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; margin-top: 3px; }

  .harvest-block { text-align: right; }
  .harvest-time  { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; color: var(--sophos); }
  .harvest-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

  /* ── STAT STRIP ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    border-top: 3px solid var(--muted);
    transition: border-color 0.3s;
  }
  .stat.crit  { border-top-color: var(--crit); }
  .stat.high  { border-top-color: var(--high); }
  .stat.med   { border-top-color: var(--med);  }
  .stat.low   { border-top-color: var(--low);  }
  .stat.total { border-top-color: var(--sophos); }
  .stat-n     { font-family: 'IBM Plex Mono', monospace; font-size: 2rem; font-weight: 600; line-height: 1; }
  .stat-n.crit  { color: var(--crit); }
  .stat-n.high  { color: var(--high); }
  .stat-n.med   { color: var(--med);  }
  .stat-n.low   { color: var(--low);  }
  .stat-n.total { color: var(--sophos); }
  .stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search {
    flex: 1; min-width: 220px; max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search:focus { border-color: var(--sophos); }
  .search::placeholder { color: var(--muted); }

  .filter-btn {
    padding: 9px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-btn:hover       { border-color: var(--sophos); color: var(--text); }
  .filter-btn.active-crit { border-color: var(--crit); color: var(--crit);  background: rgba(255,59,48,0.08);  }
  .filter-btn.active-high { border-color: var(--high); color: var(--high);  background: rgba(255,149,0,0.08);  }
  .filter-btn.active-med  { border-color: var(--med);  color: var(--med);   background: rgba(255,204,0,0.08);  }
  .filter-btn.active-low  { border-color: var(--low);  color: var(--low);   background: rgba(76,217,100,0.08); }
  .filter-btn.active-all  { border-color: var(--sophos); color: var(--sophos); background: rgba(0,176,240,0.08); }

  /* ── TABLE ── */
  .table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface); }
  th {
    padding: 11px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 13px 16px;
    font-size: 0.83rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover td { background: rgba(255,255,255,0.025); }

  /* severity left-bar */
  .sev-bar { width: 4px; border-radius: 2px; height: 28px; display: inline-block; margin-right: 10px; vertical-align: middle; }
  .sev-bar.critical { background: var(--crit); box-shadow: 0 0 8px rgba(255,59,48,0.5); }
  .sev-bar.high     { background: var(--high); box-shadow: 0 0 8px rgba(255,149,0,0.5); }
  .sev-bar.medium   { background: var(--med);  }
  .sev-bar.low      { background: var(--low);  }

  .badge {
    display: inline-block; padding: 3px 9px;
    border-radius: 4px; font-size: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
  }
  .badge.critical { background: rgba(255,59,48,0.15);  color: var(--crit); border: 1px solid rgba(255,59,48,0.3); }
  .badge.high     { background: rgba(255,149,0,0.15);  color: var(--high); border: 1px solid rgba(255,149,0,0.3); }
  .badge.medium   { background: rgba(255,204,0,0.12);  color: var(--med);  border: 1px solid rgba(255,204,0,0.3); }
  .badge.low      { background: rgba(76,217,100,0.1);  color: var(--low);  border: 1px solid rgba(76,217,100,0.25); }

  .cat-chip {
    display: inline-block; padding: 2px 8px;
    border-radius: 3px; font-size: 0.65rem;
    background: rgba(255,255,255,0.05);
    color: #888; border: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
  }

  .desc-cell { max-width: 340px; }
  .desc-main { color: var(--text); line-height: 1.4; }
  .desc-device { font-size: 0.75rem; color: var(--muted); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

  .time-cell { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  /* ── EMPTY / ERROR STATES ── */
  .state-box {
    text-align: center; padding: 80px 20px;
    background: var(--surface);
  }
  .state-icon  { font-size: 2.5rem; margin-bottom: 16px; }
  .state-title { font-size: 1rem; color: #fff; margin-bottom: 8px; }
  .state-sub   { font-size: 0.8rem; color: var(--muted); }
  .state-err   { color: var(--crit); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; margin-top: 12px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <h1>Sophos Central</h1>
      <div class="subtitle">Active Alert Monitor</div>
    </div>
  </div>
  <div class="harvest-block">
    <div id="harvest-clock" class="harvest-time">--:--:--</div>
    <div class="harvest-label">Last Harvest</div>
  </div>
</header>

<div class="stats">
  <div class="stat total"><div class="stat-n total" id="s-total">—</div><div class="stat-label">Total Alerts</div></div>
  <div class="stat crit"> <div class="stat-n crit"  id="s-crit">—</div> <div class="stat-label">Critical</div></div>
  <div class="stat high"> <div class="stat-n high"  id="s-high">—</div> <div class="stat-label">High</div></div>
  <div class="stat med">  <div class="stat-n med"   id="s-med">—</div>  <div class="stat-label">Medium</div></div>
  <div class="stat low">  <div class="stat-n low"   id="s-low">—</div>  <div class="stat-label">Low</div></div>
</div>

<div class="toolbar">
  <input class="search" id="search" placeholder="Search alerts, devices, categories..." oninput="render()">
  <button class="filter-btn active-all" id="f-all"  onclick="setFilter('all')">All</button>
  <button class="filter-btn" id="f-crit" onclick="setFilter('critical')">Critical</button>
  <button class="filter-btn" id="f-high" onclick="setFilter('high')">High</button>
  <button class="filter-btn" id="f-med"  onclick="setFilter('medium')">Medium</button>
  <button class="filter-btn" id="f-low"  onclick="setFilter('low')">Low</button>
</div>

<div class="table-wrap" id="table-wrap">
  <div class="state-box">
    <div class="state-icon">⏳</div>
    <div class="state-title">Awaiting first harvest…</div>
    <div class="state-sub">Data refreshes every 30 seconds</div>
  </div>
</div>

<script>
  let allAlerts = [];
  let activeFilter = 'all';

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
      if (b.id === 'f-' + (f === 'all' ? 'all' : f.replace('ium','').replace('ical','').replace('igh','high').replace('ow','low'))) {
        // simplify: just match data attr
      }
    });
    const map = { all: 'f-all', critical: 'f-crit', high: 'f-high', medium: 'f-med', low: 'f-low' };
    const classes = { all: 'active-all', critical: 'active-crit', high: 'active-high', medium: 'active-med', low: 'active-low' };
    const btn = document.getElementById(map[f]);
    if (btn) btn.className = 'filter-btn ' + (classes[f] || '');
    render();
  }

  function sevBadge(s) {
    return `<span class="badge ${s}">${s}</span>`;
  }

  async function fetchData() {
    try {
      const res = await fetch('data.json?v=' + Date.now());
      const d   = await res.json();

      document.getElementById('harvest-clock').textContent = d.timestamp || '--:--:--';
      document.getElementById('s-total').textContent = d.total ?? '—';
      document.getElementById('s-crit').textContent  = d.counts?.critical ?? '—';
      document.getElementById('s-high').textContent  = d.counts?.high     ?? '—';
      document.getElementById('s-med').textContent   = d.counts?.medium   ?? '—';
      document.getElementById('s-low').textContent   = d.counts?.low      ?? '—';

      if (d.error) {
        document.getElementById('table-wrap').innerHTML = `
          <div class="state-box">
            <div class="state-icon">⚠️</div>
            <div class="state-title">Could not retrieve alerts</div>
            <div class="state-err">${d.error}</div>
          </div>`;
        return;
      }

      allAlerts = d.alerts || [];
      render();
    } catch (e) {
      console.error(e);
    }
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allAlerts.filter(a => {
      const sevMatch = activeFilter === 'all' || a.severity === activeFilter;
      const qMatch   = !q || [a.description, a.device, a.category, a.product, a.type]
                              .join(' ').toLowerCase().includes(q);
      return sevMatch && qMatch;
    });

    if (filtered.length === 0) {
      document.getElementById('table-wrap').innerHTML = `
        <div class="state-box">
          <div class="state-icon">✅</div>
          <div class="state-title">${allAlerts.length === 0 ? 'No active alerts' : 'No alerts match your filter'}</div>
          <div class="state-sub">${allAlerts.length === 0 ? 'Your Sophos estate is clean.' : 'Try changing the severity filter or search.'}</div>
        </div>`;
      return;
    }

    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Severity</th>
            <th>Description</th>
            <th>Category</th>
            <th>Product</th>
            <th>Raised</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(a => `
            <tr>
              <td>${sevBadge(a.severity)}</td>
              <td class="desc-cell">
                <div class="desc-main">${esc(a.description)}</div>
                ${a.device ? `<div class="desc-device">📍 ${esc(a.device)}</div>` : ''}
              </td>
              <td><span class="cat-chip">${esc(a.category)}</span></td>
              <td style="color:#666;font-size:0.75rem;font-family:'IBM Plex Mono',monospace">${esc(a.product)}</td>
              <td class="time-cell">${esc(a.raised)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  setInterval(fetchData, 30000);
  fetchData();
</script>
</body>
</html>
